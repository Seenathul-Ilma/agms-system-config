#Database settings
#JPA Settings

server:
  port: 8085

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:mysql://localhost:3306/agms_system_userdb?createDatabaseIfNotExist=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    generate-ddl: true
    database-platform: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secretKey: 40bdf4434bd323cc1ea5a2da06d75ddbedc8997a033a97bf334b1e57fb32a215